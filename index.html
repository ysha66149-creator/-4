<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oportunidad digital desde casa</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #000;
}

img.bg-image {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: contain; /* 保证完整显示，不裁切 */
  z-index: -1;
}

.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4); /* 半透明遮罩，让文字更清晰 */
  display: flex;
  justify-content: center;
  align-items: center;
}

.content {
  text-align: center;
  color: white;
  padding: 20px;
  max-width: 400px;
}

h1 {
  font-size: 32px;
  margin-bottom: 15px;
}

p {
  font-size: 18px;
  margin-bottom: 10px;
}

ul {
  list-style: none;
  margin-bottom: 25px;
}

li {
  font-size: 16px;
  margin: 5px 0;
}

.btn {
  background: #25D366;
  color: white;
  padding: 18px 40px;
  font-size: 20px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  box-shadow: 0 0 15px rgba(0,0,0,0.3);
}

.btn:hover {
  transform: scale(1.05);
}
</style>
</head>
<body>

<!-- 背景图 -->
<img class="bg-image" src="8c85d1cb-bda5-4964-8e10-4f7701dc960e.png" alt="Publicidad">

<div class="overlay">
  <div class="content">
    <h1>Oportunidad digital desde casa</h1>
    <p>Participa en actividades digitales desde tu celular</p>
    <ul>
      <li>✓ Actividades sencillas</li>
      <li>✓ Horarios flexibles</li>
      <li>✓ Pagos diarios</li>
    </ul>
    <button class="btn" onclick="goWhatsApp()">CONTÁCTANOS POR WHATSAPP</button>
  </div>
</div>

<script>
// 10 个秘鲁 WhatsApp 账号
const whatsappNumbers = [
"https://wa.me/12267073626",
"https://wa.me/12815720146",
"https://wa.me/12369018119",
"https://wa.me/12498914202",
"https://wa.me/12264746718",
"https://wa.me/12528185641",
"https://wa.me/12489736871",
"https://wa.me/13349285385",
"https://wa.me/13435703179",
"https://wa.me/13542000689"
];

// 点击按钮随机跳转
function goWhatsApp() {
  const random = whatsappNumbers[Math.floor(Math.random() * whatsappNumbers.length)];
  window.location.href = random;
}
</script>

</body>
</html>
